name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.NOMOTIC_BOT_APP_ID }}
          private-key: ${{ secrets.NOMOTIC_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout nomotic
        uses: actions/checkout@v4
        with:
          repository: nomoticai/nomotic
          path: nomotic
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./nomotic
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=src/nomotic_ci --cov-report=term-missing

      - name: Run ruff linter
        run: python -m ruff check src/ tests/

      - name: Run mypy type checker
        run: python -m mypy src/nomotic_ci/
